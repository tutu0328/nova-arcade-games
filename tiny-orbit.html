<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#17152d">
  <meta name="description" content="小小星球：七日治愈系星球花园养成游戏">
  <title>小小星球 · TINY ORBIT</title>
  <style>
    :root{--cream:#fff8df;--ink:#202038;--sun:#ffd84a;--green:#83d483;--blue:#7bdff2;--pink:#ff9fba;--purple:#8075c7;--glass:rgba(255,248,223,.88)}
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#17152d;color:var(--ink);font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;touch-action:none}button{font:inherit;color:inherit}
    #world{position:fixed;inset:0;width:100%;height:100%;display:block}
    .hud{position:fixed;z-index:4;left:18px;right:18px;top:16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;pointer-events:none}.panel{background:var(--glass);border:2px solid #fff;box-shadow:0 14px 45px #09071755,inset 0 1px #fff;border-radius:22px;backdrop-filter:blur(12px)}
    .brand{padding:13px 16px}.brand small{display:block;color:#796eb5;font-size:10px;font-weight:1000;letter-spacing:.2em}.brand b{display:block;font-size:22px;margin-top:3px}.stats{display:flex;padding:9px;gap:7px}.stat{min-width:86px;padding:8px 10px;border-radius:15px;background:#ffffff99;text-align:center}.stat small{display:block;font-size:9px;color:#78738c;font-weight:900;letter-spacing:.1em}.stat b{display:block;font-size:17px;margin-top:3px}.tools-top{display:flex;gap:7px;pointer-events:auto}.round{width:46px;height:46px;border:2px solid #fff;border-radius:16px;background:var(--glass);box-shadow:0 10px 30px #09071744;cursor:pointer;font-weight:1000}.round:hover{transform:translateY(-2px)}
    .journal{position:fixed;z-index:4;left:18px;top:116px;width:250px;padding:16px;pointer-events:none}.journal h2{font-size:13px;margin:0 0 9px;color:#7569ad}.journal p{font-size:12px;line-height:1.6;margin:0;color:#59576b}.goals{display:grid;gap:6px;margin-top:12px}.goal{display:grid;grid-template-columns:18px 1fr auto;gap:7px;align-items:center;font-size:11px;background:#ffffff88;padding:7px;border-radius:11px}.goal i{width:16px;height:16px;border:2px solid #b9b3c6;border-radius:50%}.goal.done i{background:var(--green);border-color:var(--green);box-shadow:inset 0 0 0 3px white}.goal strong{font-size:11px}
    .message{position:fixed;z-index:5;left:50%;top:105px;transform:translateX(-50%) translateY(-10px);width:min(520px,calc(100% - 30px));padding:12px 16px;text-align:center;font-weight:850;font-size:13px;opacity:0;transition:.25s;pointer-events:none}.message.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toolbox{position:fixed;z-index:6;left:50%;bottom:18px;transform:translateX(-50%);display:flex;gap:9px;padding:9px;max-width:calc(100% - 24px)}.tool{border:2px solid transparent;background:#fffdf5;border-radius:17px;padding:10px 14px;min-width:110px;cursor:pointer;box-shadow:0 8px 20px #15112822}.tool span{display:block;font-size:22px}.tool b{display:block;font-size:12px}.tool small{color:#817c8c;font-size:9px}.tool.active{border-color:var(--purple);background:#f0edff;transform:translateY(-5px)}.tool:disabled{opacity:.4;filter:grayscale(1)}
    .day-end{position:fixed;z-index:5;right:18px;bottom:112px;border:0;border-radius:17px;padding:12px 15px;background:var(--sun);box-shadow:0 10px 30px #0003;font-weight:1000;cursor:pointer}.day-end:disabled{opacity:.5}
    .overlay{position:fixed;z-index:20;inset:0;display:grid;place-items:center;padding:20px;background:radial-gradient(circle at 64% 30%,#544c8c,#17152d 68%);transition:.3s}.overlay.hidden{opacity:0;pointer-events:none}.card{width:min(860px,100%);padding:clamp(24px,5vw,54px);background:rgba(255,248,223,.96);border:3px solid white;border-radius:36px;box-shadow:0 30px 100px #080614aa;position:relative;overflow:hidden}.card:after{content:"✦";position:absolute;right:35px;top:18px;font-size:120px;color:#ffd84a44;transform:rotate(15deg)}.kicker{font-size:10px;color:#766bb0;font-weight:1000;letter-spacing:.24em}.card h1{font-size:clamp(48px,9vw,90px);line-height:.85;letter-spacing:-.075em;margin:16px 0}.card h1 em{font-family:Georgia,serif;color:#7f75bd;font-weight:400}.card p{max-width:650px;line-height:1.8;color:#5f5b70}.rules{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:22px 0}.rule{background:white;border-radius:16px;padding:12px;font-size:12px;line-height:1.5}.rule b{display:block;font-size:21px;margin-bottom:4px}.actions{display:flex;gap:9px;flex-wrap:wrap}.primary,.secondary{border:0;border-radius:16px;padding:14px 20px;font-weight:1000;cursor:pointer}.primary{background:var(--sun);box-shadow:0 8px 24px #caa92844}.secondary{background:#ece8fb}.result{font-size:28px!important;color:#7a70b0!important;font-weight:1000}
    @media(max-width:760px){.hud{left:8px;right:8px;top:8px}.brand{display:none}.stats{width:100%;justify-content:center;padding:6px;gap:3px}.stat{min-width:0;flex:1;padding:5px 3px}.stat small{font-size:8px}.stat b{font-size:13px}.tools-top{position:fixed;right:8px;top:88px}.journal{left:8px;top:82px;width:205px;padding:11px}.journal p{display:none}.goals{margin-top:0}.goal{padding:5px}.message{top:160px}.toolbox{bottom:8px;gap:4px;padding:6px}.tool{min-width:64px;padding:8px 4px}.tool span{font-size:19px}.tool b{font-size:10px}.tool small{font-size:8px}.day-end{right:8px;bottom:92px;padding:10px}.rules{grid-template-columns:repeat(2,1fr)}.card{border-radius:25px}.card h1{font-size:52px}}
  </style>
</head>
<body>
  <canvas id="world"></canvas>
  <div class="hud">
    <div class="brand panel"><small>NOVA // POCKET PLANET</small><b>小小星球</b></div>
    <div class="stats panel"><div class="stat"><small>DAY</small><b id="dayText">1 / 7</b></div><div class="stat"><small>行动</small><b id="movesText">5</b></div><div class="stat"><small>星尘</small><b id="dustText">10 ✦</b></div><div class="stat"><small>生态</small><b id="ecoText">10</b></div><div class="stat"><small>居民</small><b id="popText">0</b></div></div>
    <div class="tools-top"><button class="round" id="soundBtn" aria-label="声音">♪</button><button class="round" id="pauseBtn" aria-label="暂停">Ⅱ</button></div>
  </div>
  <aside class="journal panel"><h2>七日花园计划</h2><p id="journalText">荒芜的小星球在等第一场雨。选择工具，再点击星球边缘的土地。</p><div class="goals"><div class="goal" id="goalEco"><i></i><span>生态值</span><strong>0/65</strong></div><div class="goal" id="goalPop"><i></i><span>邀请居民</span><strong>0/2</strong></div><div class="goal" id="goalTrash"><i></i><span>清理垃圾</span><strong>0/4</strong></div></div></aside>
  <div class="message panel" id="message"></div>
  <button class="day-end" id="dayEnd">结束今天 →</button>
  <div class="toolbox panel">
    <button class="tool active" data-tool="water"><span>💧</span><b>浇水</b><small>1 星尘 · 键 1</small></button>
    <button class="tool" data-tool="plant"><span>🌱</span><b>播种</b><small>2 星尘 · 键 2</small></button>
    <button class="tool" data-tool="clean"><span>🧹</span><b>清理</b><small>1 星尘 · 键 3</small></button>
    <button class="tool" data-tool="home"><span>🏠</span><b>邀请安家</b><small>4 星尘 · 键 4</small></button>
  </div>
  <section class="overlay" id="overlay"><div class="card" id="card">
    <small class="kicker">A SEVEN-DAY COZY PLANET</small><h1>小小<br><em>星球</em></h1><p>你有七天，把一颗巴掌大的荒芜星球变成花园。清理陨石垃圾，给土地浇水，播下种子，等待花朵成熟，再邀请古怪居民搬进来。每天结束会从轨道收集 2 枚星尘。</p>
    <div class="rules"><div class="rule"><b>💧</b>先给土地浇水</div><div class="rule"><b>🌱</b>湿润土地才能播种</div><div class="rule"><b>🌼</b>植物会在换日时成长</div><div class="rule"><b>🏠</b>花地才能建造小屋</div></div>
    <div class="actions"><button class="primary" id="startBtn">开始七日计划 ✦</button><a class="secondary" href="index.html">返回游戏库</a></div>
  </div></section>
  <script>
  (()=>{
    'use strict';
    const canvas=document.querySelector('#world'),ctx=canvas.getContext('2d'),$=s=>document.querySelector(s);
    let W=0,H=0,D=1,last=0,state='menu',day=1,moves=5,dust=10,eco=10,pop=0,cleaned=0,rotation=0,selected='water',drag=null,msgTimer=0,muted=false,audio=null,plotScreens=[];
    const keys={left:false,right:false};
    const stars=Array.from({length:110},()=>({x:Math.random(),y:Math.random(),r:.5+Math.random()*1.8,a:.25+Math.random()*.7,p:Math.random()*6}));
    const residents=[{name:'莫莫',face:'●ᴗ●',color:'#ff9fba'},{name:'皮普',face:'•◡•',color:'#7bdff2'},{name:'圆圆',face:'◕‿◕',color:'#ffd84a'},{name:'苔苔',face:'•ᴥ•',color:'#83d483'}];
    const events={2:['流星雨留下了新的碎片。','#trash'],3:['彗星经过，星尘 +3。','dust'],4:['干燥季到来，土地水分下降。','dry'],5:['居民举行茶会，生态值 +6。','tea'],6:['极光照亮花园，星尘 +4。','aurora'],7:['最后一天了，让星球开满花吧。','final']};
    let plots=[];
    function makePlots(){plots=Array.from({length:12},(_,i)=>({type:[1,4,7,10].includes(i)?'trash':'bare',wet:0,growth:0,home:-1}))}
    function resize(){D=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;canvas.width=W*D;canvas.height=H*D;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(D,0,0,D,0,0)}addEventListener('resize',resize);resize();
    function tone(f=520){if(muted)return;try{audio=audio||new(window.AudioContext||window.webkitAudioContext)();const o=audio.createOscillator(),g=audio.createGain(),t=audio.currentTime;o.type='sine';o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(f*1.5,t+.12);g.gain.setValueAtTime(.045,t);g.gain.exponentialRampToValueAtTime(.001,t+.18);o.connect(g).connect(audio.destination);o.start();o.stop(t+.2)}catch(e){}}
    function reset(){day=1;moves=5;dust=10;eco=10;pop=0;cleaned=0;rotation=0;selected='water';makePlots();updateUI();setMessage('选择工具，再点击星球边缘发光的土地。',5)}
    function setMessage(text,time=3){$('#message').textContent=text;$('#message').classList.add('show');msgTimer=time;$('#journalText').textContent=text}
    function updateUI(){$('#dayText').textContent=day+' / 7';$('#movesText').textContent=moves;$('#dustText').textContent=dust+' ✦';$('#ecoText').textContent=eco;$('#popText').textContent=pop;$('#goalEco strong').textContent=Math.min(eco,65)+'/65';$('#goalPop strong').textContent=Math.min(pop,2)+'/2';$('#goalTrash strong').textContent=Math.min(cleaned,4)+'/4';$('#goalEco').classList.toggle('done',eco>=65);$('#goalPop').classList.toggle('done',pop>=2);$('#goalTrash').classList.toggle('done',cleaned>=4);document.querySelectorAll('.tool').forEach(b=>{b.classList.toggle('active',b.dataset.tool===selected);const cost={water:1,plant:2,clean:1,home:4}[b.dataset.tool];b.disabled=state!=='play'||dust<cost||moves<=0});$('#dayEnd').disabled=state!=='play'}
    function chooseTool(tool){if(state!=='play')return;selected=tool;updateUI()}
    function act(i){if(state!=='play'||moves<=0)return;const p=plots[i],cost={water:1,plant:2,clean:1,home:4}[selected];if(dust<cost){setMessage('星尘不够了。花朵会在每天结束时产生星尘。');return}
      if(selected==='water'){if(p.type==='trash'||p.type==='home'){setMessage(p.type==='trash'?'先清理这块陨石垃圾。':'居民小屋不需要浇水。');return}p.wet=Math.min(2,p.wet+2);eco+=1;setMessage('雨滴落下，土地湿润了。')}
      if(selected==='plant'){if(p.type!=='bare'||p.wet<=0){setMessage(p.type!=='bare'?'这里已经有东西了。':'干土地不能播种，先浇水。');return}p.type='sprout';p.growth=0;p.wet--;eco+=3;setMessage('种子睡进土里，换日时会成长。')}
      if(selected==='clean'){if(p.type!=='trash'){setMessage('这块土地没有需要清理的垃圾。');return}p.type='bare';cleaned++;eco+=4;dust++;setMessage('清理完成，还从碎片里找到 1 枚星尘。')}
      if(selected==='home'){if(p.type!=='flower'){setMessage('居民只愿意住在开花的土地旁。');return}p.type='home';p.home=pop%residents.length;pop++;eco+=5;const r=residents[p.home];setMessage(r.name+' 搬来了：你好呀，这颗星球比传闻中还小！',5)}
      dust-=cost;moves--;tone(430+i*18);updateUI();if(moves<=0)setMessage('今天的行动用完了，点击“结束今天”等待植物成长。',5)}
    function endDay(){if(state!=='play')return;if(day>=7){finish();return}for(const p of plots){if(p.type==='sprout'){if(p.wet>0){p.growth++;p.wet--}if(p.growth>=2){p.type='flower';eco+=5}}else if(p.type==='flower'){dust++;p.wet=Math.max(0,p.wet-1)}else p.wet=Math.max(0,p.wet-1)}dust+=2;day++;moves=5;const ev=events[day];if(ev){if(ev[1]==='dust')dust+=3;if(ev[1]==='dry')plots.forEach(p=>p.wet=Math.max(0,p.wet-1));if(ev[1]==='tea'&&pop>0)eco+=6;if(ev[1]==='aurora')dust+=4;if(ev[1]==='#trash'){const p=plots.find(p=>p.type==='bare');if(p)p.type='trash'}setMessage('第 '+day+' 天 · '+ev[0]+' 轨道星尘 +2。',5)}tone(660);updateUI()}
    function finish(){state='end';const win=eco>=65&&pop>=2,perfect=win&&cleaned>=4&&plots.filter(p=>p.type==='flower'||p.type==='home').length>=5;const title=perfect?'星球盛放！':win?'花园诞生！':'还差一点点';$('#card').innerHTML=`<small class="kicker">SEVEN DAYS LATER</small><h1>${title}</h1><p class="result">生态 ${eco} · 居民 ${pop} · 清理 ${cleaned}</p><p>${perfect?'每一块土地都记得你的照顾，远方的居民正排队申请搬来。':win?'这颗小星球已经能自己呼吸，也终于有人叫它“家”。':'星球有了变化，但生态值需要达到 65，并至少邀请 2 位居民。再试一次会更熟练。'}</p><div class="actions"><button class="primary" id="retryBtn">${win?'再建一颗星球':'重新开始'} ✦</button><a class="secondary" href="index.html">返回游戏库</a></div>`;$('#overlay').classList.remove('hidden');$('#retryBtn').onclick=start;tone(perfect?880:win?720:330)}
    function start(){reset();state='play';$('#overlay').classList.add('hidden');updateUI();last=performance.now()}
    function planetGeometry(){const mobile=W<760,r=Math.min(mobile?W*.32:W*.235,H*.32,285),cx=mobile?W*.53:W*.57,cy=mobile?H*.51:H*.53;return{cx,cy,r}}
    function draw(t,dt){const bg=ctx.createRadialGradient(W*.56,H*.46,0,W*.5,H*.5,Math.max(W,H)*.75);bg.addColorStop(0,'#524b86');bg.addColorStop(.52,'#26213f');bg.addColorStop(1,'#100e22');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);for(const s of stars){ctx.globalAlpha=s.a*(.7+.3*Math.sin(t*.001+s.p));ctx.fillStyle='#fff8df';ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1;const {cx,cy,r}=planetGeometry();ctx.save();ctx.translate(cx,cy);ctx.strokeStyle='#fff4';ctx.lineWidth=1;ctx.beginPath();ctx.ellipse(0,0,r*1.62,r*.42,-.22,0,Math.PI*2);ctx.stroke();ctx.shadowColor='#7bdff2';ctx.shadowBlur=45;const g=ctx.createRadialGradient(-r*.32,-r*.4,r*.08,0,0,r);g.addColorStop(0,'#d8f6d1');g.addColorStop(.48,'#7ecf98');g.addColorStop(1,'#387c70');ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='#66b58c';for(let k=0;k<7;k++){const a=k*.93+rotation*.4,rr=r*(.15+(k%3)*.19),sz=r*(.13+(k%2)*.05);ctx.beginPath();ctx.arc(Math.cos(a)*rr,Math.sin(a)*rr,sz,0,Math.PI*2);ctx.fill()}ctx.fillStyle='#b5e5d0aa';ctx.beginPath();ctx.ellipse(-r*.2,-r*.55,r*.38,r*.1,.15,0,Math.PI*2);ctx.fill();ctx.restore();plotScreens=[];plots.forEach((p,i)=>{const a=i/plots.length*Math.PI*2+rotation,x=cx+Math.cos(a)*(r+18),y=cy+Math.sin(a)*(r+18),scale=.72+.28*(Math.sin(a)+1)/2;plotScreens.push({x,y});ctx.save();ctx.translate(x,y);ctx.scale(scale,scale);ctx.rotate(a+Math.PI/2);ctx.shadowColor=p.wet?'#7bdff2':'#0005';ctx.shadowBlur=p.wet?18:8;ctx.fillStyle=p.type==='trash'?'#6c6472':p.type==='home'?'#ffe59c':p.wet?'#6f9f91':'#b78a63';ctx.beginPath();ctx.ellipse(0,7,28,13,0,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.rotate(-(a+Math.PI/2));ctx.textAlign='center';ctx.font='26px system-ui';const icon=p.type==='trash'?'🪨':p.type==='sprout'?'🌱':p.type==='flower'?'🌼':p.type==='home'?'🏠':'';if(icon)ctx.fillText(icon,0,5);if(p.type==='home'){const resident=residents[p.home];ctx.fillStyle=resident.color;ctx.beginPath();ctx.arc(22,-13,12,0,Math.PI*2);ctx.fill();ctx.fillStyle='#302d47';ctx.font='7px sans-serif';ctx.fillText(resident.face,22,-11)}if(p.wet&&p.type!=='home'){ctx.fillStyle='#7bdff2';ctx.font='12px system-ui';ctx.fillText('●',17,-11)}ctx.restore()});ctx.save();ctx.translate(cx,cy);ctx.fillStyle='#fff9';for(let k=0;k<3;k++){const a=t*.00008+k*2.1;ctx.beginPath();ctx.ellipse(Math.cos(a)*r*.72,Math.sin(a)*r*.35-r*.12,35,10,.1,0,Math.PI*2);ctx.fill()}ctx.restore()}
    function loop(t){const dt=Math.min(.033,(t-last)/1000||0);last=t;if(state==='play'){if(keys.left)rotation-=dt*1.3;if(keys.right)rotation+=dt*1.3;rotation+=dt*.035;msgTimer-=dt;if(msgTimer<=0)$('#message').classList.remove('show')}draw(t,dt);requestAnimationFrame(loop)}requestAnimationFrame(loop);
    function nearestPlot(x,y){let best=-1,bd=44;plotScreens.forEach((p,i)=>{const d=Math.hypot(x-p.x,y-p.y);if(d<bd){bd=d;best=i}});return best}
    canvas.addEventListener('pointerdown',e=>{if(state!=='play')return;drag={x:e.clientX,rotation,moved:false};canvas.setPointerCapture(e.pointerId)});canvas.addEventListener('pointermove',e=>{if(!drag)return;const dx=e.clientX-drag.x;if(Math.abs(dx)>8)drag.moved=true;rotation=drag.rotation+dx*.006});canvas.addEventListener('pointerup',e=>{if(!drag)return;const moved=drag.moved;drag=null;if(!moved){const i=nearestPlot(e.clientX,e.clientY);if(i>=0)act(i)}});
    document.querySelectorAll('.tool').forEach(b=>b.onclick=()=>chooseTool(b.dataset.tool));$('#dayEnd').onclick=endDay;$('#startBtn').onclick=start;$('#pauseBtn').onclick=()=>{if(state==='play'){state='pause';setMessage('星球时间暂停。');$('#pauseBtn').textContent='▶'}else if(state==='pause'){state='play';last=performance.now();$('#pauseBtn').textContent='Ⅱ'}updateUI()};$('#soundBtn').onclick=()=>{muted=!muted;$('#soundBtn').textContent=muted?'×':'♪'};
    addEventListener('keydown',e=>{if(e.key==='a'||e.key==='ArrowLeft')keys.left=true;if(e.key==='d'||e.key==='ArrowRight')keys.right=true;if('1234'.includes(e.key))chooseTool(['water','plant','clean','home'][+e.key-1]);if(e.key==='Enter'&&state==='play')endDay()});addEventListener('keyup',e=>{if(e.key==='a'||e.key==='ArrowLeft')keys.left=false;if(e.key==='d'||e.key==='ArrowRight')keys.right=false});makePlots();updateUI();
  })();
  </script>
</body>
</html>
